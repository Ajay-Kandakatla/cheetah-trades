services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Bound to loopback only — the mini's other services reach it via the
    # compose network, nothing on the LAN should hit Mongo directly.
    ports:
      - "127.0.0.1:27017:27017"

  api:
    build:
      context: ./backend
    image: cheetah-api:latest
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: cheetah
      TZ: America/New_York
      # Pulled from the host shell at `docker compose up` time.
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-whatsapp:+14155238886}
      TWILIO_TO: ${TWILIO_TO:-}
    volumes:
      # Cron writes scan JSON here; api reads it. Shared with the cron service.
      - cheetah-scans:/root/.cheetah
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  cron:
    image: cheetah-api:latest
    restart: unless-stopped
    # Run tini as PID 1 so supercronic isn't PID 1 — supercronic's
    # subreaper-child re-exec fails on the Apple Silicon Docker VM.
    init: true
    env_file: ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: cheetah
      TZ: America/New_York
      # Pulled from the host shell at `docker compose up` time.
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-whatsapp:+14155238886}
      TWILIO_TO: ${TWILIO_TO:-}
    volumes:
      - cheetah-scans:/root/.cheetah
      - ./backend/crontab:/app/crontab:ro
    depends_on:
      - mongo
      - api
    command: ["supercronic", "/app/crontab"]

  frontend:
    build:
      context: ./frontend
    image: cheetah-frontend:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  mongo-data:
  cheetah-scans:
